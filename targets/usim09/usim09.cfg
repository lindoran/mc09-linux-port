*
* usim09.cfg - Target configuration for usim09 6809 simulator
*
* usim09 (from raybellis/usim) emulates:
*   $0000-$7FFF  32kB RAM
*   $C000-$C001  MC6850 ACIA (status=$C000, data=$C001)
*   $E000-$FFFF   8kB ROM
*   Reset vector at $FFFE
*
* Build:
*   mktarget targets/usim09/usim09.cfg targets/usim09
*   MCDIR=. MCINCLUDE=./include MCLIBDIR=./targets/usim09/lib09 \
*     cc09 prog.c -Iq
*   echo "" | usim09 prog.HEX
*

* Memory map
CODE_ORG    SET     $E000   * ROM base - code is placed here
STACK_TOP   SET     $7F00   * Top of 32kB RAM
RAM_ORG     SET     $0100   * Globals base: skip zero page ($0000-$00FF)

* ROM target - emit vector table
ROM_TARGET  SET     1       * 1=emit vector table at VECTOR_ORG
VECTOR_ORG  SET     $FFF0   * 6809 hardware vector table address

* Exit behaviour: 0=spin, 1=jump EXIT_ADDR, 2=SWI
EXIT_MODE   SET     0       * spin forever (no monitor in usim09)
EXIT_ADDR   SET     $E000   * (unused for EXIT_MODE=0)

* I/O driver
IO_DRIVER   SET     "mc6850"    * MC6850 ACIA

* UART parameters (MC6850 at $C000)
UART_BASE   SET     $C000   * ACIA base address
UART_STATUS SET     0       * status register at base+0
UART_DATA   SET     1       * data register at base+1
UART_TXRDY  SET     $02     * bit 1 = TDRE (TX data register empty)
UART_RXRDY  SET     $01     * bit 0 = RDRF (RX data register full)
UART_CRLF   SET     1       * translate LF -> CR+LF on output
