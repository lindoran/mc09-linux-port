*
* coco_test.cfg - CoCo target for automated MAME testing
*
* Used by: make test-coco
*          sh tests/run_tests_coco.sh
*
* CODE_ORG is $C003, not $C000, so that the three bytes at
* $C000-$C002 remain free for the CoCo autostart preamble:
*   $C000 = $55   (magic byte - Extended BASIC checks this)
*   $C001-$C002   (execution address -> $C003 = ?begin)
*
* The test runner Python script patches those three bytes in
* the raw binary before passing the ROM to MAME.
*
* Memory map (CoCo 2B):
*   $0000-$05FF  BASIC workspace (do not use)
*   $0600-$0FFD  User globals (BSS, cleared by startup)
*   $0FFE-$0FFF  TESTBUF_WRIDX: 16-bit output buffer write pointer
*   $1000-$7EFF  Output buffer (~28KB, read by MAME Lua monitor)
*   $7F00        Stack top (descends from here)
*   $A000-$BFFF  BASIC ROM (vectors at $A000, $A002)
*   $C000-$DFFF  Cartridge ROM (our code starts at $C003)
*   $E000-$FFFF  Extended BASIC ROM
*
* The TESTBUF_WRIDX and TESTBUF_BASE keys activate the test buffer
* feature in mktarget: startup clears BSS ($0600-$0FFD) then
* initialises the write pointer at $0FFE to $1000 (buffer base).
* No manual post-mktarget edits to 6809RLP.ASM are needed.
*

CODE_ORG    SET     $C003   * Startup code after autostart preamble
STACK_TOP   SET     $7F00   * Top of user RAM
RAM_ORG     SET     $0600   * Globals base: after BASIC workspace

ROM_TARGET  SET     1       * Emit hardware vector table
VECTOR_ORG  SET     $DFF0   * Top of 8kB cartridge ROM space

EXIT_MODE   SET     0       * Spin after main returns (cartridge stays put)

IO_DRIVER   SET     "coco_test"     * Linear RAM buffer I/O driver

* Test buffer layout (must match drivers/coco_test.asm)
TESTBUF_WRIDX   SET     $0FFE   * 16-bit big-endian write pointer address
TESTBUF_BASE    SET     $1000   * Buffer base address (initial WRIDX value)

* UART_* are not used by coco_test driver but mktarget requires them
UART_BASE   SET     $FF00
UART_STATUS SET     0
UART_DATA   SET     1
UART_TXRDY  SET     $02
UART_RXRDY  SET     $01
UART_CRLF   SET     1
