*
* coco.cfg - Target configuration for TRS-80 Color Computer 1/2 cartridge
*
* Produces a standard CoCo cartridge ROM that autostarts on boot.
* The CoCo Extended BASIC checks for $55 at $C000 on startup; if found
* it does JSR [$C001] which jumps to $C003 (?begin).
*
* CODE_ORG=$C003 (not $C000) leaves three gap bytes at $C000-$C002 that
* the build script patches with the autostart preamble:
*   $C000 = $55   autostart magic
*   $C001 = $C0   execution address high byte \
*   $C002 = $03   execution address low byte   -> JSR $C003 = ?begin
*
* Without the preamble, Extended BASIC ignores the cartridge and shows
* the OK prompt. The user can still run manually with EXEC.
*
* BSS_CLEAR=1 is required because CoCo RAM is not zeroed at reset.
* The startup code clears $0600-$7EFF before calling main() so that
* C uninitialised globals are zero as the standard requires.
*
* I/O goes through CoCo BASIC ROM vectors:
*   $A002 = CHROUT: output char in A register to screen
*   $A000 = POLCAT: poll keyboard (return char in A, Z=1 if no key)
*
* After main() returns, EXIT_MODE=1 jumps to BASIC warm start ($A027)
* so the CoCo returns to a usable BASIC prompt rather than hanging.
*
* Build:
*   mktarget targets/coco/coco.cfg targets/coco
*   MCDIR=. MCINCLUDE=./include MCLIBDIR=./targets/coco/lib09 \
*     cc09 prog.c -Iq
*
* Then patch the ROM and run in MAME:
*   objcopy -I ihex -O binary --gap-fill 0xFF prog.HEX prog_raw.bin
*   python3 -c "... patch preamble ..." prog_raw.bin prog.rom
*   mame coco2b -window -skip_gameinfo -cart prog.rom
*
* See examples/hello_coco/ for a complete worked example.
*

* Memory map
CODE_ORG    SET     $C003   * Cartridge code — after 3-byte autostart preamble
STACK_TOP   SET     $7F00   * Top of user RAM
RAM_ORG     SET     $0600   * Globals base: after BASIC workspace ($0000-$05FF)

* ROM target — emit 6809 vector table at top of cartridge ROM
ROM_TARGET  SET     1
VECTOR_ORG  SET     $DFF0   * Top of 8kB cartridge ROM ($C000-$DFFF)

* BSS clear — required on real hardware (RAM not zeroed at reset)
BSS_CLEAR   SET     1

* Exit: spin after main() completes
* EXIT_MODE=1 (jump to BASIC warm start $A027) causes an infinite loop
* because BASIC sees $55 at $C000 and immediately re-launches the
* cartridge. Spinning is the correct behaviour — the CoCo stays alive
* and the user can reset or power-cycle as needed.
EXIT_MODE   SET     0       * spin forever after main() returns
EXIT_ADDR   SET     $A027   * (unused for EXIT_MODE=0)

* I/O driver: CoCo BASIC ROM vectors (CHROUT/POLCAT)
* Outputs directly to the CoCo screen — visible in MAME window
IO_DRIVER   SET     "coco_rom"

* UART_* not used by coco_rom driver but required by mktarget
UART_BASE   SET     $FF00
UART_STATUS SET     0
UART_DATA   SET     1
UART_TXRDY  SET     $02
UART_RXRDY  SET     $01
UART_CRLF   SET     1
