*
* coco.cfg - Target configuration for TRS-80 Color Computer 1/2
*
* The CoCo uses the Motorola 6809 and provides character I/O through
* the BASIC ROM vector table at $A000. This config targets a cartridge
* ROM at $C000 (8kB), which is the standard CoCo cartridge space.
*
* Memory layout:
*   $0000-$00FF  Direct page (6809 DP register)
*   $0600-$7FFF  User RAM (after BASIC workspace)
*   $A000-$BFFF  BASIC ROM
*   $C000-$DFFF  Cartridge ROM (our code goes here)
*   $E000-$FFFF  High ROM (Extended BASIC / DOS)
*   $FFF0-$FFFF  Hardware vectors (in high ROM, not ours to fill)
*
* I/O is via CoCo BASIC ROM vectors:
*   $A002 = CHROUT: output char in A
*   $A000 = POLCAT: poll keyboard, return char in A (0=no key)
*
* Build:
*   mktarget targets/coco/coco.cfg targets/coco
*   MCDIR=. MCINCLUDE=./include MCLIBDIR=./targets/coco/lib09 \
*     cc09 prog.c -Iq S=CRT0.ASM
*

* Memory map
CODE_ORG    SET     $C000   * Cartridge ROM base
STACK_TOP   SET     $7F00   * Top of user RAM

* ROM target - emit vector table at top of cartridge ROM
ROM_TARGET  SET     1
VECTOR_ORG  SET     $DFF0   * Top of 8kB cartridge ROM space

* Exit behaviour: return to BASIC
EXIT_MODE   SET     1       * jump to EXIT_ADDR on return from main
EXIT_ADDR   SET     $A027   * CoCo BASIC warm start

* I/O driver: CoCo ROM vectors, no UART registers involved
IO_DRIVER   SET     "coco_rom"

* UART_* not used by coco_rom driver
UART_BASE   SET     $FF00
UART_STATUS SET     0
UART_DATA   SET     1
UART_TXRDY  SET     $02
UART_RXRDY  SET     $01
UART_CRLF   SET     1
